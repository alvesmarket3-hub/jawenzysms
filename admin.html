<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Kontrol Paneli - VerifyPro</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #0b0f19; color: #ffffff; font-family: 'Segoe UI', sans-serif; font-size: 11pt; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .admin-header { background-color: #141b2d; border-bottom: 2px solid #ff5c5c; padding: 20px; border-radius: 6px; margin-bottom: 30px; }
        .title { font-size: 16pt; font-weight: bold; color: #ff5c5c; display: flex; align-items: center; }
        .admin-table { width: 100%; border-collapse: collapse; background-color: #141b2d; border-radius: 6px; overflow: hidden; margin-top: 15px; }
        .admin-table th, .admin-table td { padding: 14px; text-align: left; border-bottom: 1px solid #1f2940; }
        .admin-table th { background-color: #1f2940; color: #ff5c5c; font-weight: bold; }
        .admin-input { background: #0b0f19; border: 1px solid #2e3b52; color: #fff; padding: 8px 12px; border-radius: 4px; width: 130px; font-weight: bold; font-size: 11pt; }
        .admin-input:focus { border-color: #ff5c5c; outline: none; }
        .admin-btn { background-color: #ff5c5c; border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .admin-btn:hover { background-color: #ff3333; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 9pt; font-weight: bold; }
        .status-waiting { background-color: rgba(240, 173, 78, 0.2); color: #f0ad4e; border: 1px solid #f0ad4e; }
        .status-completed { background-color: rgba(92, 184, 92, 0.2); color: #5cb85c; border: 1px solid #5cb85c; }
    </style>
</head>
<body>
<div class="container">

    <div class="admin-header">
        <div class="title">🛠️ VerifyPro | CANLI SMS SİPARİŞ YÖNETİMİ PANELİ</div>
        <div style="font-size:9.5pt; color:#a1a8b5; margin-top:5px;">Müşterilerin oluşturduğu SMS talepleri buraya anlık düşer. Yazdığınız kodlar kalıcı olarak veritabanına işlenir.</div>
    </div>

    <table class="admin-table">
        <thead>
            <tr>
                <th>Talep ID</th>
                <th>Platform</th>
                <th>Sistem Numarası</th>
                <th>İstek Saati</th>
                <th>Durum</th>
                <th>SMS Onay Kodu Gir</th>
                <th>Eylem</th>
            </tr>
        </thead>
        <tbody id="adminTableBody">
            <tr><td colspan="7" style="text-align:center; color:#a1a8b5;">Siparişler yükleniyor...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Sayfa açıldığında ve her 2 saniyede bir sipariş listesini yenile
    loadAdminOrders();
    setInterval(loadAdminOrders, 2000);

    async function loadAdminOrders() {
        try {
            const res = await fetch('/api/orders');
            const data = await res.json();
            if(!data.success) return;

            const adminBody = document.getElementById('adminTableBody');
            adminBody.innerHTML = '';

            if(data.orders.length === 0) {
                adminBody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#a1a8b5; padding:30px;">Henüz sistemde oluşturulmuş hiçbir SMS isteği yok.</td></tr>';
                return;
            }

            data.orders.forEach(o => {
                const statusBadge = o.status === 'Waiting' 
                    ? `<span class="status-badge status-waiting">KOD BEKLİYOR</span>` 
                    : `<span class="status-badge status-completed">TAMAMLANDI</span>`;

                adminBody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold; color:#a1a8b5;">${o.id}</td>
                        <td style="font-weight:bold; color:#00adb5;">${o.serviceName}</td>
                        <td style="font-size:12pt; letter-spacing:1px; font-weight:bold;">${o.number}</td>
                        <td>${o.date || '--:--'}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <input type="text" id="input-${o.id}" class="admin-input" value="${o.smsCode || ''}" placeholder="SMS Kodu">
                        </td>
                        <td>
                            <button class="admin-btn" onclick="submitCode('${o.id}')">Kodu Gönder</button>
                        </td>
                    </tr>
                `;
            });
        } catch(e){ console.error("Tablo yükleme hatası:", e); }
    }

    async function submitCode(orderId) {
        const codeVal = document.getElementById(`input-${orderId}`).value;
        if(!codeVal) return alert('Lütfen önce geçerli bir kod yazın!');
        
        try {
            const res = await fetch('/api/admin/set-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ orderId, smsCode: codeVal })
            });
            const data = await res.json();
            if(data.success) {
                loadAdminOrders();
            }
        } catch(e){ alert('Kod gönderim hatası!'); }
    }
</script>
</body>
</html>
